<!DOCTYPE html>
<html>
<head>
<title>Payroll Records</title>
</head>
<body>

<h1>Payroll Records</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Employee</th>
<th>Salary</th>
<th>Bonus</th>
<th>Deduction</th>
<th>Net Salary</th>

</tr>

{% for p in payrolls %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
