<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HR Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --dust:   #DDD1C7;
  --silver: #C2CFB2;
  --green:  #8DB580;
  --mummy:  #7E8987;
  --indigo: #4B4A67;
  --white:  #FAFAF8;
  --dark:   #2a2938;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Outfit', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--dust);
  color: var(--dark);
  min-height: 100vh;
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 50% at 85% 10%, rgba(141,181,128,0.16) 0%, transparent 65%),
    radial-gradient(ellipse 45% 55% at 5% 88%, rgba(75,74,103,0.1) 0%, transparent 65%);
}

/* TOPBAR */
.topbar {
  background: rgba(75,74,103,0.97);
  backdrop-filter: blur(16px);
  padding: 0 48px; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(141,181,128,0.15);
  position: sticky; top: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--green), #6fa063);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  box-shadow: 0 0 18px rgba(141,181,128,0.35);
}
.brand-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--white); }
.brand-name span { color: var(--green); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.badge { background: rgba(141,181,128,0.2); border: 1px solid rgba(141,181,128,0.35); color: var(--green); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.back-btn { display: flex; align-items: center; gap: 8px; color: var(--dust); text-decoration: none; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; border: 1px solid rgba(221,209,199,0.2); transition: 0.25s; }
.back-btn:hover { background: rgba(221,209,199,0.12); }

/* CONTENT */
.content {
  position: relative; z-index: 1;
  padding: 56px 48px;
  max-width: 900px; margin: 0 auto;
}

.page-header {
  text-align: center; margin-bottom: 48px;
  animation: fadeUp 0.4s ease both;
}
.page-header h1 {
  font-family: var(--font-display);
  font-size: 44px; font-weight: 800; color: var(--indigo);
  letter-spacing: -0.02em; margin-bottom: 12px;
}
.page-header h1 span { color: var(--green); }
.page-header p { color: var(--mummy); font-size: 15px; font-weight: 300; }

/* CHAT CARD */
.chat-card {
  background: var(--white);
  border-radius: 24px;
  padding: 42px 44px;
  border: 1px solid rgba(75,74,103,0.07);
  box-shadow: 0 8px 40px rgba(75,74,103,0.08);
  animation: fadeUp 0.5s ease 0.1s both;
}

.form-label {
  display: block; font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mummy); margin-bottom: 10px;
}

textarea {
  width: 100%;
  padding: 18px 20px;
  border: 1.5px solid rgba(75,74,103,0.15);
  border-radius: 14px;
  font-family: var(--font-body); font-size: 14px; font-weight: 400;
  color: var(--dark); background: var(--dust);
  resize: vertical; outline: none; transition: 0.25s;
  line-height: 1.65;
}
textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(141,181,128,0.15);
  background: var(--white);
}
textarea::placeholder { color: var(--mummy); font-weight: 300; }

.submit-btn {
  width: 100%; padding: 16px;
  background: var(--indigo); color: var(--white);
  border: none; border-radius: 14px; margin-top: 16px;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  letter-spacing: 0.02em;
}
.submit-btn:hover { background: var(--green); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(141,181,128,0.3); }

/* ANSWER */
.answer-card {
  margin-top: 32px;
  background: var(--white);
  border-radius: 20px;
  padding: 32px 36px;
  border: 1px solid rgba(141,181,128,0.25);
  box-shadow: 0 4px 24px rgba(75,74,103,0.06);
  position: relative; overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.answer-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
  background: linear-gradient(to bottom, var(--green), var(--indigo));
  border-radius: 20px 0 0 20px;
}
.answer-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.answer-header-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(141,181,128,0.15);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.answer-header strong {
  font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--indigo);
}
.answer-body {
  white-space: pre-wrap; font-size: 14px; line-height: 1.75;
  color: var(--dark); font-weight: 400;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="brand">
    <div class="brand-icon"><img src="static\Screenshot 2026-06-07 135430.png " width="40" height="40"></a></div>
    <div class="brand-name">HRMs <span></span></div>
  </div>
  <div class="topbar-right">
    <span class="badge">💬 HR Chatbot</span>
    <a href="/hr-dashboard" class="back-btn">← Dashboard</a>
  </div>
</nav>

<div class="content">

  <div class="page-header">
    <h1>HR <span>Assistant</span> AI</h1>
    <p>Ask anything about HR policies, processes, or workforce management.</p>
  </div>

  <div class="chat-card">
    <label class="form-label">Your Question</label>
    <form method="POST">
      <textarea name="question" rows="7" placeholder="Ask HR related questions — policies, leave rules, payroll queries, onboarding steps..." required></textarea>
      <button type="submit" class="submit-btn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Ask AI
      </button>
    </form>

    {% if answer %}
    <div class="answer-card">
      <div class="answer-header">
        <div class="answer-header-icon">🤖</div>
        <strong>AI Response</strong>
      </div>
      <div class="answer-body">{{ answer }}</div>
    </div>
    {% endif %}
  </div>

</div>
</body>
</html>
