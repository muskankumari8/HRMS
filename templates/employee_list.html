<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee List - AI HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dust:   #DDD1C7;
            --silver: #C2CFB2;
            --green:  #8DB580;
            --mummy:  #7E8987;
            --ink:    #4B4A67;
            --white:  #FAFAF8;
            --shadow: rgba(75,74,103,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: var(--dust);
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -140px; right: -140px;
            width: 460px; height: 460px;
            background: radial-gradient(circle, rgba(141,181,128,0.2) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }

        header {
            padding: 48px 56px 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--mummy);
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px;
            font-weight: 300;
            color: var(--ink);
        }

        h1 span { color: var(--green); font-weight: 600; }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            background: var(--ink);
            color: var(--white);
            text-decoration: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            align-self: flex-end;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        .add-btn:hover {
            background: #3a3950;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(75,74,103,0.22);
        }

        .table-wrap {
            margin: 32px 56px 60px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 4px 32px var(--shadow);
            overflow: hidden;
            animation: fadeUp 0.65s ease both;
            animation-delay: 0.1s;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr { background: var(--ink); }

        thead th {
            padding: 16px 20px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--silver);
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid rgba(126,137,135,0.1);
            transition: background 0.2s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(194,207,178,0.12); }

        tbody td {
            padding: 15px 20px;
            font-size: 14px;
            color: var(--ink);
            vertical-align: middle;
        }

        td:nth-child(1) { font-size: 12px; color: var(--mummy); font-weight: 500; }
        td:nth-child(2) { font-weight: 500; }

        /* Email */
        td:nth-child(3) { color: var(--mummy); font-size: 13px; }

        /* Department badge */
        .dept-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            background: rgba(194,207,178,0.4);
            color: var(--ink);
            font-size: 12px;
            font-weight: 500;
        }

        /* Salary */
        td:nth-child(5) {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--green);
        }

        .delete-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(180,100,90,0.1);
            color: #a0524a;
            text-decoration: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s, transform 0.2s;
        }

        .delete-btn:hover {
            background: rgba(180,100,90,0.2);
            transform: translateY(-1px);
        }

        @media (max-width: 800px) {
            header { padding: 32px 20px 0; }
            .table-wrap { margin: 24px 12px 40px; border-radius: 16px; }
            thead th, tbody td { padding: 12px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <div class="brand-icon"><img src="static\Screenshot 2026-06-07 135430.png " width="40" height="40"></a></div>
        <div class="brand">HRMS</div>
        <h1>Employee <span>List</span></h1>
    </div>
    <a href="/employees" class="add-btn">+ Add New Employee</a>
</header>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for employee in employees %}
            <tr>
                <td>{{ employee[0] }}</td>
                <td>{{ employee[1] }}</td>
                <td>{{ employee[2] }}</td>
                <td><span class="dept-badge">{{ employee[3] }}</span></td>
                <td>₹ {{ employee[4] }}</td>
                <td>
                    <a href="/delete-employee/{{ employee[0] }}"
                       class="delete-btn"
                       onclick="return confirm('Delete this employee?')">
                       ✕ Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
