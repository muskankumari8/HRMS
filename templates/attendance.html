<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Management - AI HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dust:   #DDD1C7;
            --silver: #C2CFB2;
            --green:  #8DB580;
            --mummy:  #7E8987;
            --ink:    #4B4A67;
            --white:  #FAFAF8;
            --shadow: rgba(75,74,103,0.13);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: var(--dust);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -160px; right: -100px;
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(141,181,128,0.22) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; left: -100px;
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(194,207,178,0.25) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }

        .page {
            width: 100%;
            max-width: 560px;
            animation: fadeUp 0.65s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(26px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-header { margin-bottom: 30px; }

        .brand-tag {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--ink);
            color: var(--silver);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 99px;
            margin-bottom: 18px;
        }

        .brand-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.65); }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px;
            font-weight: 300;
            color: var(--ink);
            line-height: 1.1;
        }

        h1 em { font-style: normal; color: var(--green); font-weight: 600; }

        .page-desc {
            font-size: 13px;
            color: var(--mummy);
            margin-top: 8px;
            line-height: 1.6;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 32px var(--shadow);
        }

        .field-group { margin-bottom: 22px; }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--mummy);
            margin-bottom: 8px;
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--mummy);
            pointer-events: none;
            font-size: 12px;
        }

        select, input[type="date"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid rgba(126,137,135,0.25);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            background: var(--white);
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            cursor: pointer;
        }

        select:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(141,181,128,0.15);
        }

        /* Status radio pills */
        .status-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-option { position: relative; }

        .status-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        .status-option label {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 12px 16px;
            border: 1.5px solid rgba(126,137,135,0.22);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--ink);
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .status-option input[type="radio"]:checked + label {
            border-color: var(--green);
            background: rgba(141,181,128,0.1);
            color: var(--ink);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-present { background: var(--green); }
        .dot-absent  { background: #c97c6e; }
        .dot-wfh     { background: var(--mummy); }
        .dot-leave   { background: var(--silver); border: 1px solid var(--mummy); }

        .divider {
            height: 1px;
            background: rgba(126,137,135,0.15);
            margin: 26px 0;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            letter-spacing: 0.07em;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            background: #3a3950;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75,74,103,0.25);
        }

        .success-msg {
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(141,181,128,0.15);
            border-left: 3px solid var(--green);
            border-radius: 10px;
            font-size: 13px;
            color: var(--ink);
            animation: fadeUp 0.4s ease both;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="page-header">
        <div class="brand-tag">
            <div class="brand-icon"><img src="static\Screenshot 2026-06-07 135430.png " width="40" height="40"></a></div>
            <span class="brand-dot"></span>
            HRMS
        </div>
        <h1>Attendance<br><em>Management</em></h1>
        <p class="page-desc">Record daily attendance status for each team member.</p>
    </div>

    <div class="card">
        <form method="POST">

            <div class="field-group">
                <label class="field-label">Employee</label>
                <div class="select-wrap">
                    <select name="employee_name" required>
                        <option value="">— Choose employee —</option>
                        {% for employee in employees %}
                        <option value="{{ employee[0] }}">{{ employee[0] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="field-group">
                <label class="field-label">Status</label>
                <div class="status-group">
                    <div class="status-option">
                        <input type="radio" name="status" id="s-present" value="Present" required>
                        <label for="s-present"><span class="status-dot dot-present"></span>Present</label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="s-absent" value="Absent">
                        <label for="s-absent"><span class="status-dot dot-absent"></span>Absent</label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="s-wfh" value="Work From Home">
                        <label for="s-wfh"><span class="status-dot dot-wfh"></span>Work From Home</label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="s-leave" value="Leave">
                        <label for="s-leave"><span class="status-dot dot-leave"></span>Leave</label>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <button type="submit" class="submit-btn">Mark Attendance →</button>

        </form>

        {% if message %}
        <div class="success-msg">✓ {{ message }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
