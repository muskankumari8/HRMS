<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Performance Analyzer - AI HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dust:   #DDD1C7;
            --silver: #C2CFB2;
            --green:  #8DB580;
            --mummy:  #7E8987;
            --ink:    #4B4A67;
            --white:  #FAFAF8;
            --shadow: rgba(75,74,103,0.13);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: var(--dust);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -160px; right: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(141,181,128,0.22) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }

        .page {
            width: 100%;
            max-width: 600px;
            animation: fadeUp 0.65s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(26px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .page-header { margin-bottom: 30px; }

        .brand-tag {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--ink);
            color: var(--silver);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 99px;
            margin-bottom: 18px;
        }

        .brand-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.65); }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px;
            font-weight: 300;
            color: var(--ink);
            line-height: 1.1;
        }

        h1 em { font-style: normal; color: var(--green); font-weight: 600; }

        .page-desc {
            font-size: 13px;
            color: var(--mummy);
            margin-top: 8px;
            line-height: 1.6;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 32px var(--shadow);
        }

        .field-group { margin-bottom: 22px; }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--mummy);
            margin-bottom: 8px;
        }

        .field-hint {
            font-size: 11px;
            color: rgba(126,137,135,0.7);
            margin-top: 5px;
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--mummy);
            pointer-events: none;
            font-size: 12px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid rgba(126,137,135,0.25);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            background: var(--white);
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input[type="number"]::placeholder { color: rgba(126,137,135,0.5); }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(141,181,128,0.15);
        }

        /* Score inputs grid */
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .score-item { display: flex; flex-direction: column; gap: 7px; }

        .score-item .field-label { margin-bottom: 0; }

        /* Score track bar below input */
        .score-track {
            height: 4px;
            background: rgba(126,137,135,0.15);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 4px;
        }

        .score-fill {
            height: 100%;
            width: 0%;
            background: var(--green);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .divider {
            height: 1px;
            background: rgba(126,137,135,0.15);
            margin: 26px 0;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            letter-spacing: 0.07em;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            background: #3a3950;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75,74,103,0.25);
        }

        .result-box {
            margin-top: 26px;
            padding: 24px 28px;
            background: rgba(141,181,128,0.1);
            border-left: 3px solid var(--green);
            border-radius: 14px;
            font-size: 14px;
            color: var(--ink);
            line-height: 1.7;
            animation: fadeUp 0.5s ease both;
        }

        .result-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 10px;
        }

        @media (max-width: 500px) {
            .scores-grid { grid-template-columns: 1fr; }
            .card { padding: 28px 22px; }
        }
    </style>
</head>
<body>

<div class="page">
    <div class="page-header">
        <div class="brand-tag">
            <div class="brand-icon"><img src="static\Screenshot 2026-06-07 135430.png " width="40" height="40"></a></div>
            <span class="brand-dot"></span>
            HRMS
        </div>
        <h1>Performance<br><em>Analyzer</em></h1>
        <p class="page-desc">AI-powered analysis of employee performance across key metrics.</p>
    </div>

    <div class="card">
        <form method="POST">

            <div class="field-group">
                <label class="field-label">Employee</label>
                <div class="select-wrap">
                    <select name="employee_name" required>
                        <option value="">— Select employee —</option>
                        {% for employee in employees %}
                        <option value="{{ employee[0] }}">{{ employee[0] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Score Inputs <span style="font-weight:300; letter-spacing:0; text-transform:none;">(0 – 100)</span></label>
                <div class="scores-grid">

                    <div class="score-item">
                        <label class="field-label" for="att-score">Attendance</label>
                        <input type="number" id="att-score" name="attendance"
                               placeholder="e.g. 92" min="0" max="100" required
                               oninput="updateBar(this,'att-bar')">
                        <div class="score-track"><div class="score-fill" id="att-bar"></div></div>
                    </div>

                    <div class="score-item">
                        <label class="field-label" for="task-score">Task</label>
                        <input type="number" id="task-score" name="task"
                               placeholder="e.g. 85" min="0" max="100" required
                               oninput="updateBar(this,'task-bar')">
                        <div class="score-track"><div class="score-fill" id="task-bar"></div></div>
                    </div>

                    <div class="score-item">
                        <label class="field-label" for="fb-score">Feedback</label>
                        <input type="number" id="fb-score" name="feedback"
                               placeholder="e.g. 78" min="0" max="100" required
                               oninput="updateBar(this,'fb-bar')">
                        <div class="score-track"><div class="score-fill" id="fb-bar"></div></div>
                    </div>

                </div>
            </div>

            <div class="divider"></div>

            <button type="submit" class="submit-btn">Analyze Performance →</button>

        </form>

        {% if result %}
        <div class="result-box">
            <div class="result-title">Analysis Result</div>
            {{ result }}
        </div>
        {% endif %}
    </div>
</div>

<script>
    function updateBar(input, barId) {
        const val = Math.min(Math.max(parseFloat(input.value) || 0, 0), 100);
        document.getElementById(barId).style.width = val + '%';
    }
</script>

</body>
</html>
